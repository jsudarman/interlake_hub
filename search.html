<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Saints Station</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .search-page { padding: 48px 0 80px; }
    .search-hero { background: var(--primary-dark); padding: 36px 0 40px; }
    .search-hero h1 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; margin-bottom: 16px; }
    .search-bar-large {
      display: flex; align-items: center;
      background: var(--card); border-radius: var(--radius);
      border: 2px solid var(--primary);
      padding: 0 16px; gap: 10px; max-width: 600px;
    }
    .search-bar-large input {
      flex: 1; border: none; outline: none; font-size: 1rem;
      padding: 14px 0; font-family: var(--font);
      background: transparent; color: var(--text);
    }
    .search-bar-large input::placeholder { color: var(--text-muted); }
    .search-bar-large .search-icon-lg { color: var(--primary); font-size: 1rem; }

    .results-section { margin-bottom: 40px; }
    .results-section-title {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--primary); margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 2px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .results-count {
      background: var(--primary); color: #fff; border-radius: 20px;
      padding: 1px 9px; font-size: .72rem;
    }

    .result-card {
      background: var(--card); border-radius: var(--radius-sm);
      box-shadow: var(--shadow); padding: 16px 20px;
      border-left: 3px solid var(--primary);
      margin-bottom: 10px; text-decoration: none;
      display: block; transition: var(--transition); color: var(--text);
    }
    .result-card:hover { box-shadow: var(--shadow-md); transform: translateX(2px); }
    .result-card-title { font-size: .95rem; font-weight: 700; margin-bottom: 4px; }
    .result-card-meta { font-size: .75rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .result-card-desc { font-size: .82rem; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

    .no-results { text-align: center; padding: 60px 24px; color: var(--text-muted); }
    .no-results .no-results-icon { font-size: 3rem; margin-bottom: 16px; opacity: .4; }
    .no-results h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }

    .query-highlight { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon"><img src="images/interlakelogo.jpg" alt="Interlake Hub"></div>
      <div class="brand-text">
        <span class="brand-name">Saints Station</span>
        <span class="brand-sub">Interlake High School</span>
      </div>
    </a>
    <nav class="navbar-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
      <a href="general.html" class="nav-link">IHS General</a>
      <a href="classoffice.html" class="nav-link">Class Office</a>
      <a href="clubs.html" class="nav-link">Clubs</a>
    </nav>
    <div class="navbar-actions">
      <div class="nav-search">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="navSearch" placeholder="Search…" autocomplete="off">
      </div>
      <a href="submit.html" class="btn btn-accent" style="padding:7px 14px;font-size:.82rem;">+ Officer Portal</a>
    </div>
  </div>
</nav>

<div class="search-hero">
  <div class="container">
    <h1>Search Saints Station</h1>
    <div class="search-bar-large">
      <span class="search-icon-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="searchInput" placeholder="Search clubs, events, categories…" autocomplete="off">
    </div>
  </div>
</div>

<div class="search-page">
  <div class="container">
    <div id="searchStatus" style="font-size:.88rem;color:var(--text-muted);margin-bottom:28px;"></div>
    <div id="searchResults"></div>
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <div>
      <div class="footer-brand" style="display:flex;align-items:center;gap:8px;"><img src="images/interlakelogo.jpg" alt="Interlake Hub" style="width:22px;height:22px;"> Saints Station</div>
      <p>A central place for Interlake High School students to stay connected.</p>
    </div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="clubs.html">Clubs</a>
      <a href="calendar.html">Calendar</a>
      <a href="classoffice.html">Class Office</a>
      <a href="general.html">IHS General</a>
      <a href="submit.html">Officer Portal</a>
    </div>
  </div>
  <div class="container" style="text-align:center;padding:6px 0 10px;font-size:.72rem;color:var(--primary);border-top:1px solid var(--border);">Created by Nasya Sudarman</div>
</footer>

<script src="data.js"></script>
<script>
const input = document.getElementById("searchInput");
const statusEl = document.getElementById("searchStatus");
const resultsEl = document.getElementById("searchResults");

// Pre-fill from URL ?q=
const params = new URLSearchParams(location.search);
const initialQ = params.get("q") || "";
if (initialQ) { input.value = initialQ; runSearch(initialQ); }
else { statusEl.textContent = "Type a keyword to search clubs and events."; }

input.addEventListener("input", () => {
  const q = input.value.trim();
  const url = new URL(location.href);
  if (q) url.searchParams.set("q", q); else url.searchParams.delete("q");
  history.replaceState(null, "", url);
  if (q.length >= 2) runSearch(q); else {
    resultsEl.innerHTML = "";
    statusEl.textContent = "Type at least 2 characters to search.";
  }
});

function match(text, q) {
  return text && text.toLowerCase().includes(q.toLowerCase());
}

function hl(text, q) {
  if (!text) return "";
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return text.replace(re, '<mark style="background:rgba(50,146,201,.18);color:var(--primary);border-radius:2px;padding:0 2px;">$1</mark>');
}

function runSearch(q) {
  statusEl.innerHTML = 'Results for <span class="query-highlight">"' + q + '"</span>';

  // ── Clubs ─────────────────────────────────────────────────────────────────
  const clubs = getClubs().filter(c =>
    match(c.name, q) || match(c.tagline, q) || match(c.category, q) ||
    match(getCategoryLabel(c.category), q) || match(c.description, q) ||
    (c.officers || []).some(o => match(o.name, q))
  );

  // ── Events ────────────────────────────────────────────────────────────────
  const events = getEvents().filter(ev =>
    match(ev.title, q) || match(ev.description, q) ||
    match(ev.category, q) || match(ev.type, q) || match(ev.date, q)
  );

  const total = clubs.length + events.length;
  if (total === 0) {
    resultsEl.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <h2>No results for "${q}"</h2>
        <p>Try a different keyword — club name, event type, or category.</p>
      </div>`;
    return;
  }

  let html = "";

  // Clubs section
  if (clubs.length) {
    html += `<div class="results-section">
      <div class="results-section-title">
        Clubs
        <span class="results-count">${clubs.length}</span>
      </div>`;
    clubs.forEach(c => {
      html += `<a href="club.html?id=${c.id}" class="result-card">
        <div class="result-card-title">${hl(c.name, q)}</div>
        <div class="result-card-meta">
          <span class="badge" style="background:var(--primary);color:#fff;font-size:.65rem;">${getCategoryLabel(c.category)}</span>
          ${c.memberCount ? `${c.memberCount} members` : ""}
        </div>
        ${c.tagline ? `<div class="result-card-desc">${hl(c.tagline, q)}</div>` : ""}
      </a>`;
    });
    html += `</div>`;
  }

  // Events section
  if (events.length) {
    html += `<div class="results-section">
      <div class="results-section-title">
        Events
        <span class="results-count">${events.length}</span>
      </div>`;
    events.forEach(ev => {
      html += `<a href="calendar.html" class="result-card">
        <div class="result-card-title">${hl(ev.title, q)}</div>
        <div class="result-card-meta">
          <span>${ev.date || ""}</span>
          ${ev.category ? `<span class="badge" style="background:var(--primary);color:#fff;font-size:.65rem;">${ev.category}</span>` : ""}
          ${ev.type ? `<span style="text-transform:capitalize;">${ev.type}</span>` : ""}
        </div>
        ${ev.description ? `<div class="result-card-desc">${hl(ev.description, q)}</div>` : ""}
      </a>`;
    });
    html += `</div>`;
  }

  resultsEl.innerHTML = html;
}

// Nav search
document.getElementById("navSearch").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const q = e.target.value.trim();
    if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
  }
});
</script>
</body>
</html>

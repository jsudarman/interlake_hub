<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club — Saints Station</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .club-hero { background: #fff; border-bottom: 1px solid var(--border); }
    .tabs-bar { background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 64px; z-index: 50; }
    .tabs-bar-inner { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .tabs-bar-inner::-webkit-scrollbar { display: none; }
    .tab-link { padding: 14px 18px; font-size: .87rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: var(--transition); }
    .tab-link:hover { color: var(--text); }
    .tab-link.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-section { display: none; }
    .tab-section.active { display: block; }
    .join-box { background: var(--highlight); border-radius: var(--radius); padding: 24px; color: var(--text); margin-bottom: 24px; border: 1px solid var(--border); }
    .join-box h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
    .join-box p { font-size: .85rem; opacity: .85; line-height: 1.6; margin-bottom: 16px; }
    .contact-links { display: flex; flex-direction: column; gap: 8px; }
    .contact-link { display: flex; align-items: center; gap: 8px; font-size: .83rem; color: var(--text-muted); }
    .contact-link a { color: var(--primary); font-weight: 600; }
    .next-meeting-box { background: var(--highlight); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 0; }
    .next-meeting-box h3 { font-size: .85rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .next-meeting-date { font-size: 1.05rem; font-weight: 600; color: var(--primary); margin-bottom: 12px; }
    .not-found { text-align: center; padding: 80px 24px; }
    .empty-updates { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 40px; text-align: center; }
    .empty-updates .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
    .officers-photo-wrap { border-radius: var(--radius) var(--radius) 0 0; overflow: hidden; }
    .officers-photo-wrap img { width: 100%; display: block; max-height: 220px; object-fit: cover; }
    .officers-names-row { display: flex; justify-content: space-between; gap: 8px; padding: 14px 20px; flex-wrap: wrap; border-top: 1px solid var(--border); }
    .officer-name-item { text-align: center; flex: 1; min-width: 80px; }
    .officer-name-item .oname { font-size: .82rem; font-weight: 700; color: var(--text); }
    .officer-name-item .orole { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon"><img src="images/interlakelogo.jpg" alt="Interlake Hub"></div>
      <div class="brand-text">
        <span class="brand-name">Saints Station</span>
        <span class="brand-sub">Interlake High School</span>
      </div>
    </a>
    <nav class="navbar-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
      <a href="general.html" class="nav-link">IHS General</a>
      <a href="asb.html" class="nav-link">ASB</a>
      <a href="classoffice.html" class="nav-link">Class Office</a>
      <a href="clubs.html" class="nav-link active">Clubs</a>
    </nav>
    <div class="navbar-actions">
      <div class="nav-search">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="navSearch" placeholder="Search…" autocomplete="off">
      </div>
      <a href="submit.html" class="btn btn-accent" style="padding:7px 14px;font-size:.82rem;">+ Officer Portal</a>
    </div>
  </div>
</nav>

<div id="pageContent"></div>

<footer class="footer">
  <div class="container footer-inner">
    <div>
      <div class="footer-brand" style="display:flex;align-items:center;gap:8px;"><img src="images/interlakelogo.jpg" alt="Interlake Hub" style="width:22px;height:22px;"> Saints Station</div>
      <p>A central place for Interlake High School students to stay connected.</p>
    </div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="clubs.html">Clubs</a>
      <a href="calendar.html">Calendar</a>
      <a href="classoffice.html">Class Office</a>
      <a href="general.html">IHS General</a>
      <a href="submit.html">Officer Portal</a>
    </div>
  </div>
  <div class="container" style="text-align:center;padding:6px 0 10px;font-size:.72rem;color:var(--primary);border-top:1px solid var(--border);">Created by Nasya Sudarman</div>
</footer>

<script src="data.js"></script>
<script>

const params = new URLSearchParams(location.search);
const clubId = params.get("id");
const club   = clubId ? getClubById(clubId) : null;
const content = document.getElementById("pageContent");

if (!club) {
  content.innerHTML = `
    <div class="container not-found">
      <div style="font-size:3rem;margin-bottom:16px;"></div>
      <h2>Club not found</h2>
      <p style="color:var(--text-muted);margin-bottom:24px;">We couldn't find that club.</p>
      <a href="clubs.html" class="btn btn-primary">Browse All Clubs</a>
    </div>`;
} else {
  const color  = getCategoryColor(club.category);
  const all    = club.updates || [];
  const agendas = all.filter(u => u.type === "agenda");
  const recaps  = all.filter(u => u.type === "recap");
  const announcements = all.filter(u => u.type === "announcement");
  const officers = club.officers || [];
  const agendaItems = (club.nextMeeting && club.nextMeeting.items) || [];

  document.title = `${club.name} — Saints Station`;

  function updateFeed(items, emptyMsg, addHref) {
    if (!items.length) return `
      <div class="empty-updates">
        <div class="empty-icon"></div>
        <h3>No ${emptyMsg} yet</h3>
        <p>Club officers can submit using the form.</p>
        <a href="${addHref}" class="btn btn-primary" style="margin-top:16px;">Submit Now</a>
      </div>`;
    return `<div class="update-feed">${items.map(u => `
      <div class="update-item" style="border-left-color:${getUpdateBadgeColor(u.type)};">
        <div class="update-header">
          <div>
            <div class="update-title">${u.title}</div>
            <div class="update-meta">
              <span class="badge" style="background:${getUpdateBadgeColor(u.type)};font-size:.65rem;">${u.type}</span>
              &nbsp;${formatDate(u.date)}
              ${u.author ? ` · By ${u.author}` : ""}
            </div>
          </div>
        </div>
        <div class="update-content">${u.content}</div>
      </div>`).join("")}</div>`;
  }

  function officersTab() {
    if (!officers.length) return `
      <div class="empty-updates">
        <div class="empty-icon"></div>
        <h3>Officers not listed yet</h3>
        <p>Club officers can add this info via the Officer Portal.</p>
      </div>`;
    return `<div class="officers-grid">${officers.map(o => {
      const initials = o.name.split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
      return `
        <div class="officer-card">
          <div class="officer-avatar">${initials}</div>
          <div class="officer-name">${o.name}</div>
          <div class="officer-role">${o.role}</div>
          <div class="officer-grade">Grade ${o.grade}</div>
          ${o.email ? `<div class="officer-email"><a href="mailto:${o.email}" style="color:var(--primary-light);">${o.email}</a></div>` : ""}
        </div>`;
    }).join("")}</div>`;
  }

  const submitBase = `submit.html?club=${club.id}`;

  // Latest recap for overview snapshot
  const latestRecap = recaps[0] || null;

  // Upcoming events relevant to this club (category match or name mention)
  const allEvents = getEvents();
  const nameLower = club.name.toLowerCase();
  const relevantEvents = allEvents
    .filter(ev => daysUntil(ev.date) >= 0 && (
      ev.category === club.category ||
      ev.title.toLowerCase().includes(nameLower) ||
      ev.description.toLowerCase().includes(nameLower)
    ))
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .slice(0, 3);

  content.innerHTML = `
    <div class="club-hero">
      <div class="container">
        <div class="breadcrumb">
          <a href="index.html">Home</a><span class="sep">›</span>
          <a href="clubs.html">Clubs</a><span class="sep">›</span>
          <a href="clubs.html?cat=${club.category}">${getCategoryLabel(club.category)}</a><span class="sep">›</span>
          <span>${club.name}</span>
        </div>
        <div class="club-hero-inner" style="padding-bottom:32px;">
          <div class="club-hero-info">
            <span class="badge" style="background:var(--primary);color:#fff;margin-bottom:10px;">${getCategoryLabel(club.category)}</span>
            <h1>${club.name}</h1>
            <div class="club-hero-meta">
              <div class="club-hero-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;margin-right:4px;opacity:.7;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><strong>${club.members} members</strong></div>
              <div class="club-hero-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;margin-right:4px;opacity:.7;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><strong>${club.meetingDays}</strong></div>
              <div class="club-hero-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;margin-right:4px;opacity:.7;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><strong>${club.meetingTime}</strong></div>
              <div class="club-hero-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;margin-right:4px;opacity:.7;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><strong>${club.meetingLocation}</strong></div>
              ${club.advisor ? `<div class="club-hero-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;margin-right:4px;opacity:.7;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Advisor: <strong>${club.advisor}</strong></div>` : ""}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tabs-bar">
      <div class="container tabs-bar-inner">
        <div class="tab-link active" data-tab="overview">Overview</div>
        <div class="tab-link" data-tab="agendas">Agendas <span class="count-chip">${agendas.length}</span></div>
        <div class="tab-link" data-tab="recaps">Recaps <span class="count-chip">${recaps.length}</span></div>
        <div class="tab-link" data-tab="announcements">Announcements <span class="count-chip">${announcements.length}</span></div>
        <div class="tab-link" data-tab="officers">Officers <span class="count-chip">${officers.length}</span></div>
        <div class="tab-link" data-tab="join">How to Join</div>
      </div>
    </div>

    <div class="container" style="padding-top:32px;padding-bottom:80px;">
      <div class="club-layout">
        <div>
          <!-- Overview -->
          <div class="tab-section active" id="tab-overview">

            <!-- 1. About -->
            <div class="info-card" style="margin-bottom:24px;">
              <div class="info-card-header"><h3>About ${club.name}</h3></div>
              <div class="info-card-body">
                <p style="font-size:.93rem;line-height:1.7;color:#374151;">${club.description}</p>
                ${club.tags ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;">${club.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>` : ""}
              </div>
            </div>

            <!-- 2. Leadership photo + officer names -->
            <div class="info-card" style="margin-bottom:24px;overflow:hidden;">
              <div class="officers-photo-wrap">
                <img src="https://placehold.co/800x220/1e3a8a/ffffff?text=Leadership+Photo"
                     alt="${club.name} Leadership">
              </div>
              ${officers.length ? `<div class="officers-names-row">${officers.map(o => `<div class="officer-name-item"><div class="oname">${o.name}</div><div class="orole">${o.role}</div></div>`).join("")}</div>` : ""}
            </div>

            <!-- 3. Latest Recap -->
            <div class="info-card" style="margin-bottom:24px;">
              <div class="info-card-header" style="justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:8px;"><h3>Latest Recap</h3></div>
                ${recaps.length ? `<a href="#" id="viewAllRecaps" style="font-size:.8rem;font-weight:600;color:var(--primary);text-decoration:none;">View all →</a>` : ""}
              </div>
              <div class="info-card-body">
                ${latestRecap ? `
                  <div class="update-item" style="border-left-color:${getUpdateBadgeColor("recap")};margin-bottom:0;">
                    <div class="update-title">${latestRecap.title}</div>
                    <div class="update-meta" style="margin-bottom:8px;font-size:.78rem;color:var(--text-muted);">
                      ${formatDate(latestRecap.date)}${latestRecap.author ? ` · By ${latestRecap.author}` : ""}
                    </div>
                    <div class="update-content">${latestRecap.content.slice(0, 200)}${latestRecap.content.length > 200 ? "…" : ""}</div>
                  </div>` : `<p style="font-size:.88rem;color:var(--text-muted);">No recaps yet — check back after the next meeting!</p>`}
              </div>
            </div>

            <!-- 4. Next Meeting Agenda -->
            ${club.nextMeeting ? `
            <div class="info-card" style="margin-bottom:24px;">
              <div class="info-card-header"><h3>Next Meeting Agenda</h3></div>
              <div class="info-card-body">
                <div class="next-meeting-box">
                  <h3>Upcoming Meeting</h3>
                  <div class="next-meeting-date">${formatDate(club.nextMeeting.date)}</div>
                  <div class="agenda-list">
                    ${agendaItems.map((item, i) => `
                      <div class="agenda-item">
                        <div class="agenda-num">${i+1}</div>
                        <span>${item}</span>
                      </div>`).join("")}
                  </div>
                </div>
              </div>
            </div>` : ""}

            <!-- 5. Upcoming Events (only shown when relevant events exist) -->
            ${relevantEvents.length ? `
            <div class="info-card" style="margin-bottom:24px;">
              <div class="info-card-header"><h3>Upcoming Events</h3></div>
              <div class="info-card-body" style="padding:14px 16px;display:flex;flex-direction:column;gap:14px;">
                ${relevantEvents.map(ev => {
                  const d     = new Date(ev.date + "T00:00:00");
                  const month = d.toLocaleDateString("en-US", { month: "short" }).toUpperCase();
                  const day   = d.getDate();
                  return `<div style="display:flex;gap:14px;align-items:flex-start;">
                    <div style="background:var(--primary);color:#fff;min-width:52px;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;flex-shrink:0;">
                      <span style="font-size:.62rem;font-weight:700;letter-spacing:.08em;opacity:.8;">${month}</span>
                      <span style="font-size:1.5rem;font-weight:900;line-height:1;">${day}</span>
                    </div>
                    <div style="flex:1;min-width:0;padding-top:2px;">
                      <div style="font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:5px;">${ev.title}</div>
                      <div style="display:flex;flex-direction:column;gap:3px;">
                        <span style="font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ev.time}</span>
                        <span style="font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${ev.location}</span>
                      </div>
                    </div>
                  </div>`;
                }).join("")}
              </div>
            </div>` : ""}

            <!-- Participation Requirements -->
            <div class="info-card">
              <div class="info-card-header"><h3>Participation Requirements</h3></div>
              <div class="info-card-body">
                <div class="requirements-list">
                  ${(club.requirements||[]).map(r=>`
                    <div class="requirement-item">
                      <div class="req-check">✓</div><span>${r}</span>
                    </div>`).join("")}
                </div>
              </div>
            </div>
          </div>

          <!-- Agendas -->
          <div class="tab-section" id="tab-agendas">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <h3 style="font-size:1.1rem;font-weight:700;">Meeting Agendas</h3>
              <a href="${submitBase}&type=agenda" class="btn btn-outline" style="font-size:.82rem;padding:7px 14px;">+ Add Agenda</a>
            </div>
            ${updateFeed(agendas, "agendas", submitBase + "&type=agenda")}
          </div>

          <!-- Recaps -->
          <div class="tab-section" id="tab-recaps">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <h3 style="font-size:1.1rem;font-weight:700;">Meeting Recaps</h3>
              <a href="${submitBase}&type=recap" class="btn btn-outline" style="font-size:.82rem;padding:7px 14px;">+ Add Recap</a>
            </div>
            ${updateFeed(recaps, "recaps", submitBase + "&type=recap")}
          </div>

          <!-- Announcements -->
          <div class="tab-section" id="tab-announcements">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <h3 style="font-size:1.1rem;font-weight:700;">Announcements</h3>
              <a href="${submitBase}&type=announcement" class="btn btn-outline" style="font-size:.82rem;padding:7px 14px;">+ Add Announcement</a>
            </div>
            ${updateFeed(announcements, "announcements", submitBase + "&type=announcement")}
          </div>

          <!-- Officers -->
          <div class="tab-section" id="tab-officers">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <h3 style="font-size:1.1rem;font-weight:700;">Club Officers</h3>
            </div>
            ${officersTab()}
          </div>

          <!-- How to Join -->
          <div class="tab-section" id="tab-join">
            <div class="info-card" style="margin-bottom:24px;">
              <div class="info-card-header"><h3>How to Get Involved</h3></div>
              <div class="info-card-body">
                <p style="font-size:.93rem;line-height:1.7;color:#374151;">${club.howToJoin}</p>
              </div>
            </div>
            <div class="info-card">
              <div class="info-card-header"><h3>Requirements</h3></div>
              <div class="info-card-body">
                <div class="requirements-list">
                  ${(club.requirements||[]).map(r=>`
                    <div class="requirement-item">
                      <div class="req-check">✓</div><span>${r}</span>
                    </div>`).join("")}
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <aside>
          <div class="join-box">
            <h3>Interested in joining?</h3>
            <p>${club.howToJoin.slice(0,120)}${club.howToJoin.length>120?"…":""}</p>
            <div class="contact-links">
              ${club.contactEmail ? `<div class="contact-link"><a href="mailto:${club.contactEmail}">${club.contactEmail}</a></div>` : ""}
              ${club.instagram ? `<div class="contact-link">${club.instagram}</div>` : ""}
              ${club.advisor ? `<div class="contact-link">Advisor: ${club.advisor}</div>` : ""}
            </div>
          </div>

          <div class="info-card">
            <div class="info-card-header"><span><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><h3>Meeting Details</h3></div>
            <div class="info-card-body" style="padding:12px 16px;">
              <div class="info-row">
                <div class="info-row-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;opacity:.55;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <div class="info-row-text"><div class="label">Days</div><div class="value">${club.meetingDays}</div></div>
              </div>
              <div class="info-row">
                <div class="info-row-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;opacity:.55;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div class="info-row-text"><div class="label">Time</div><div class="value">${club.meetingTime}</div></div>
              </div>
              <div class="info-row">
                <div class="info-row-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;opacity:.55;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
                <div class="info-row-text"><div class="label">Location</div><div class="value">${club.meetingLocation}</div></div>
              </div>
              <div class="info-row">
                <div class="info-row-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;opacity:.55;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                <div class="info-row-text"><div class="label">Members</div><div class="value">${club.members} students</div></div>
              </div>
              ${club.advisor ? `
              <div class="info-row">
                <div class="info-row-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;opacity:.55;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <div class="info-row-text"><div class="label">Advisor</div><div class="value">${club.advisor}</div></div>
              </div>` : ""}
            </div>
          </div>

          <!-- Related clubs -->
          <div class="info-card" style="margin-top:20px;">
            <div class="info-card-header">
              <h3>More ${getCategoryLabel(club.category)}</h3>
            </div>
            <div id="relatedClubs"></div>
          </div>
        </aside>
      </div>
    </div>`;

  // Tab switching
  document.querySelectorAll(".tab-link").forEach(link => {
    link.addEventListener("click", () => {
      document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
      document.querySelectorAll(".tab-section").forEach(s => s.classList.remove("active"));
      link.classList.add("active");
      document.getElementById("tab-" + link.dataset.tab).classList.add("active");
    });
  });

  // "View all recaps" link in overview switches to recaps tab
  const viewAllRecaps = document.getElementById("viewAllRecaps");
  if (viewAllRecaps) {
    viewAllRecaps.addEventListener("click", e => {
      e.preventDefault();
      const recapsTab = document.querySelector('.tab-link[data-tab="recaps"]');
      if (recapsTab) recapsTab.click();
    });
  }

  // Related clubs
  const allClubs = getClubs();
  const related  = allClubs.filter(c => c.category === club.category && c.id !== club.id).slice(0, 4);
  const relEl    = document.getElementById("relatedClubs");
  if (related.length) {
    relEl.innerHTML = related.map(c => `
      <a href="club.html?id=${c.id}" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);text-decoration:none;transition:var(--transition);"
         onmouseover="this.style.background='var(--highlight)'" onmouseout="this.style.background=''">
        <div>
          <div style="font-size:.85rem;font-weight:700;color:var(--text);">${c.name}</div>
          <div style="font-size:.75rem;color:var(--text-muted);"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px;margin-right:2px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>${c.members}</div>
        </div>
        <span style="margin-left:auto;font-size:.75rem;color:var(--primary);">→</span>
      </a>`).join("") +
      `<a href="clubs.html?cat=${club.category}" style="display:block;padding:12px 16px;font-size:.82rem;font-weight:600;color:var(--primary);text-align:center;">View all →</a>`;
  } else {
    relEl.innerHTML = `<div style="padding:16px;font-size:.85rem;color:var(--text-muted);">No other clubs in this category yet.</div>`;
  }

  // Handle ?type= URL param to pre-select tab
  const tabParam = params.get("tab");
  if (tabParam) {
    const tabLink = document.querySelector(`.tab-link[data-tab="${tabParam}"]`);
    if (tabLink) tabLink.click();
  }
}

document.getElementById("navSearch").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const q = e.target.value.trim();
    if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Office — Interlake Student Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Hero ── */
    .class-hero { background: linear-gradient(135deg, var(--primary-dark) 0%, #1e4d9b 100%); padding: 40px 0 44px; color: #fff; }
    .class-hero h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 900; margin-bottom: 4px; }
    .class-hero .grade-label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; opacity: .7; }

    /* ── Layout ── */
    .class-layout { padding: 40px 0 80px; display: flex; flex-direction: column; gap: 32px; }

    /* ── Officers ── */
    .officers-photo-wrap { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .officers-photo-wrap img { width: 100%; height: auto; display: block; max-height: 240px; object-fit: cover; }
    .officers-names-row { display: flex; justify-content: space-between; gap: 8px; padding: 16px 20px; background: var(--card); flex-wrap: wrap; }
    .officer-name-item { text-align: center; flex: 1; min-width: 100px; }
    .officer-name-item .oname { font-size: .82rem; font-weight: 700; color: var(--text); }
    .officer-name-item .orole { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Section card ── */
    .section-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 28px 24px; }
    .section-card-title { font-size: 1rem; font-weight: 800; color: var(--primary-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* ── Activity bullets ── */
    .activity-list { display: flex; flex-direction: column; gap: 10px; }
    .activity-item { display: flex; align-items: flex-start; gap: 10px; font-size: .9rem; color: #374151; line-height: 1.5; }
    .activity-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 7px; }

    /* ── Fundraiser list ── */
    .fundraiser-list { display: flex; flex-direction: column; gap: 14px; }
    .fundraiser-item { border-left: 3px solid var(--primary); padding: 12px 16px; background: var(--bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .fundraiser-date { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--primary); margin-bottom: 4px; }
    .fundraiser-title { font-size: .95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .fundraiser-location { font-size: .78rem; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .fundraiser-desc { font-size: .82rem; color: #475569; line-height: 1.5; }

    /* ── Poll ── */
    .poll-options { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .poll-option {
      padding: 9px 18px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--card); color: var(--text-muted); font-size: .85rem; font-weight: 600;
      cursor: pointer; user-select: none; transition: var(--transition);
    }
    .poll-option:hover { border-color: var(--primary); color: var(--primary); }
    .poll-option.selected { background: var(--primary); border-color: var(--primary); color: #fff; }
    .poll-other-input { margin-top: 8px; display: none; }
    .poll-result { background: #eff6ff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
    .poll-result-title { font-size: .82rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
    .poll-result-tag { display: inline-block; background: var(--primary); color: #fff; border-radius: 20px; padding: 3px 12px; font-size: .78rem; font-weight: 600; margin: 3px 4px 3px 0; }

    /* ── Feedback ── */
    .feedback-result { background: #eff6ff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; font-size: .88rem; color: var(--primary-dark); font-weight: 600; }

    /* ── Instagram ── */
    .instagram-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff; padding: 12px 24px; border-radius: var(--radius-sm);
      font-size: .9rem; font-weight: 700; text-decoration: none;
      transition: var(--transition);
    }
    .instagram-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: var(--shadow-md); }

    /* ── Not found ── */
    .not-found { text-align: center; padding: 80px 24px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon"><img src="images/interlakelogo.jpg" alt="Interlake Hub"></div>
      <div class="brand-text">
        <span class="brand-name">Interlake Hub</span>
        <span class="brand-sub">Student Activity Center</span>
      </div>
    </a>
    <nav class="navbar-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
      <a href="general.html" class="nav-link">General</a>
      <a href="classoffice.html" class="nav-link active">Class Office</a>
      <a href="clubs.html" class="nav-link">Clubs</a>
    </nav>
    <div class="navbar-actions">
      <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="navSearch" placeholder="Search…" autocomplete="off">
      </div>
      <a href="submit.html" class="btn btn-accent" style="padding:7px 14px;font-size:.82rem;">+ Officer Portal</a>
    </div>
  </div>
</nav>

<div id="pageContent"></div>

<footer class="footer">
  <div class="container footer-inner">
    <div>
      <div class="footer-brand" style="display:flex;align-items:center;gap:8px;">
        <img src="images/interlakelogo.jpg" alt="Interlake Hub" style="width:22px;height:22px;">
        Interlake Student Hub
      </div>
      <p>A central place for Interlake High School students to stay connected.</p>
    </div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="clubs.html">Clubs</a>
      <a href="calendar.html">Calendar</a>
      <a href="classoffice.html">Class Office</a>
      <a href="general.html">General</a>
      <a href="submit.html">Officer Portal</a>
    </div>
  </div>
</footer>

<script src="data.js"></script>
<script>
const CLASS_DATA = {
  "2027": {
    grade: "Seniors",
    officers: [
      { name: "Emily Zhang",   role: "President" },
      { name: "Marcus Rivera", role: "Vice President" },
      { name: "Sofia Patel",   role: "Secretary" },
      { name: "Noah Kim",      role: "Treasurer" },
      { name: "Ava Johnson",   role: "Events Chair" }
    ],
    activities: [
      "Finalized senior prom venue and confirmed the date for May 30th",
      "Organized senior sunrise event — over 80 seniors attended",
      "Met with administration to confirm graduation ceremony details",
      "Launched the senior memories photo campaign on Instagram"
    ],
    fundraisers: [
      {
        date: "June 5, 2026",
        title: "Senior Bake Sale",
        location: "Main Lobby — all three lunches",
        desc: "Homemade treats made by class members. All proceeds go toward the senior activities fund."
      },
      {
        date: "June 12, 2026",
        title: "Chipotle Restaurant Night",
        location: "Chipotle, 148th Ave SE, Bellevue",
        desc: "Dine between 4–8 PM and mention Interlake Class of 2027 at checkout — 33% of your purchase comes back to our class."
      }
    ],
    instagram: "https://www.instagram.com/"
  },
  "2028": {
    grade: "Juniors",
    officers: [
      { name: "Jordan Lee",      role: "President" },
      { name: "Isabella Torres", role: "Vice President" },
      { name: "Ryan Nakamura",   role: "Secretary" },
      { name: "Priya Menon",     role: "Treasurer" },
      { name: "Caleb Thompson",  role: "Events Chair" }
    ],
    activities: [
      "Began researching junior prom venues for spring 2027",
      "Organized class-wide participation in spirit week",
      "Coordinated a joint service event with NHS",
      "Collected classmate input on class motto and colors"
    ],
    fundraisers: [
      {
        date: "June 3, 2026",
        title: "Popsicle Sale",
        location: "Courtyard — all three lunches",
        desc: "Beat the end-of-year heat with popsicles! $1 each — all proceeds support junior class events next year."
      },
      {
        date: "June 17, 2026",
        title: "Panda Express Restaurant Night",
        location: "Panda Express, Bellevue Way NE",
        desc: "Show our flyer or mention Interlake Class of 2028 between 5–9 PM and 20% goes directly to our class fund."
      }
    ],
    instagram: "https://www.instagram.com/"
  },
  "2029": {
    grade: "Sophomores",
    officers: [
      { name: "Mia Chen",       role: "President" },
      { name: "Ethan Brooks",   role: "Vice President" },
      { name: "Lily Osei",      role: "Secretary" },
      { name: "Daniel Park",    role: "Treasurer" },
      { name: "Grace Hoffman",  role: "Events Chair" }
    ],
    activities: [
      "Hosted our first class social with over 60 students in attendance",
      "Planned the sophomore semi-formal for late May",
      "Launched the class Instagram account — 200+ followers and growing",
      "Surveyed classmates on fundraiser ideas for next semester"
    ],
    fundraisers: [
      {
        date: "May 29, 2026",
        title: "Bake Sale",
        location: "Main Lobby — all three lunches",
        desc: "Sweet and savory treats baked by class members. Stop by during lunch and support the Class of 2029!"
      },
      {
        date: "June 9, 2026",
        title: "Chipotle Night",
        location: "Chipotle, NE 8th St, Bellevue",
        desc: "Mention Interlake Class of 2029 at checkout between 4–8 PM and 33% comes back to our class fund."
      }
    ],
    instagram: "https://www.instagram.com/"
  },
  "2030": {
    grade: "Freshmen",
    officers: [
      { name: "Aiden Walsh",  role: "President" },
      { name: "Chloe Singh",  role: "Vice President" },
      { name: "Mason Reed",   role: "Secretary" },
      { name: "Zoe Martinez", role: "Treasurer" },
      { name: "Liam Okoro",   role: "Events Chair" }
    ],
    activities: [
      "Held our first class officer meeting and set goals for the year",
      "Introduced class office at the freshman orientation assembly",
      "Organized a freshman social mixer during advisory week",
      "Started planning the end-of-year class celebration"
    ],
    fundraisers: [
      {
        date: "June 2, 2026",
        title: "Popsicle Sale",
        location: "Courtyard — all three lunches",
        desc: "Our first-ever fundraiser! Popsicles for $1 each. Come support the Class of 2030."
      },
      {
        date: "June 19, 2026",
        title: "Panda Express Restaurant Night",
        location: "Panda Express, Bellevue Way NE",
        desc: "Our first restaurant night! Mention Class of 2030 between 5–9 PM and 20% goes to our class fund."
      }
    ],
    instagram: "https://www.instagram.com/"
  }
};

const VALID_YEARS = ["2027", "2028", "2029", "2030"];
const params = new URLSearchParams(location.search);
const year   = params.get("year");
const data   = VALID_YEARS.includes(year) ? CLASS_DATA[year] : null;
const content = document.getElementById("pageContent");

if (!data) {
  content.innerHTML = `
    <div class="container not-found">
      <div style="font-size:3rem;margin-bottom:16px;">😕</div>
      <h2>Class not found</h2>
      <p style="color:var(--text-muted);margin-bottom:24px;">We couldn't find a page for that class year.</p>
      <a href="classoffice.html" class="btn btn-primary">Back to Class Office</a>
    </div>`;
} else {
  document.title = `Class of ${year} — Interlake Student Hub`;

  const VOTE_KEY     = `hub_vote_${year}`;
  const FEEDBACK_KEY = `hub_feedback_${year}`;

  const savedVote     = (() => { try { return JSON.parse(localStorage.getItem(VOTE_KEY)); } catch { return null; } })();
  const savedFeedback = localStorage.getItem(FEEDBACK_KEY);

  // Build officer names HTML
  const officerNamesHtml = data.officers.map(o => `
    <div class="officer-name-item">
      <div class="oname">${o.name}</div>
      <div class="orole">${o.role}</div>
    </div>`).join("");

  // Build activity list HTML
  const activitiesHtml = data.activities.map(a => `
    <div class="activity-item">
      <div class="activity-dot"></div>
      <span>${a}</span>
    </div>`).join("");

  // Build fundraiser list HTML
  const fundraisersHtml = data.fundraisers.map(f => `
    <div class="fundraiser-item">
      <div class="fundraiser-date">${f.date}</div>
      <div class="fundraiser-title">${f.title}</div>
      <div class="fundraiser-location">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${f.location}
      </div>
      <div class="fundraiser-desc">${f.desc}</div>
    </div>`).join("");

  // Build poll section HTML (or result if already voted)
  function buildPollSection() {
    if (savedVote) {
      const tags = savedVote.options.map(o => `<span class="poll-result-tag">${o}</span>`).join("");
      const otherTag = savedVote.other ? `<span class="poll-result-tag">Other: ${savedVote.other}</span>` : "";
      return `
        <div class="poll-result">
          <div class="poll-result-title">Your vote has been recorded — thanks!</div>
          ${tags}${otherTag}
        </div>`;
    }
    return `
      <p style="font-size:.88rem;color:var(--text-muted);margin-bottom:14px;">
        Select all options you'd like to see. Your vote is saved and won't reset on refresh.
      </p>
      <div class="poll-options" id="pollOptions">
        <div class="poll-option" data-value="Bake Sale">Bake Sale</div>
        <div class="poll-option" data-value="Restaurant Night (Chipotle)">Restaurant Night (Chipotle)</div>
        <div class="poll-option" data-value="Restaurant Night (Panda Express)">Restaurant Night (Panda Express)</div>
        <div class="poll-option" data-value="Popsicle Sale">Popsicle Sale</div>
        <div class="poll-option" data-value="__other__">Other</div>
      </div>
      <div class="poll-other-input" id="otherInputWrap">
        <input type="text" class="form-control" id="otherText" placeholder="What else would you suggest?">
      </div>
      <button class="btn btn-primary" id="submitVoteBtn" style="margin-top:14px;">Submit Vote →</button>
      <div id="voteError" style="color:#ef4444;font-size:.8rem;margin-top:8px;display:none;">Please select at least one option.</div>`;
  }

  // Build feedback section HTML
  function buildFeedbackSection() {
    if (savedFeedback) {
      return `<div class="feedback-result">Thanks — we've received your feedback!</div>`;
    }
    return `
      <p style="font-size:.88rem;color:var(--text-muted);margin-bottom:12px;">
        Have an idea or something you'd like class office to know? Drop it here.
      </p>
      <textarea class="form-control" id="feedbackText" rows="5"
        placeholder="Your suggestions, ideas, or feedback for class office…"
        style="resize:vertical;margin-bottom:12px;"></textarea>
      <button class="btn btn-primary" id="submitFeedbackBtn">Submit Feedback →</button>
      <div id="feedbackError" style="color:#ef4444;font-size:.8rem;margin-top:8px;display:none;">Please enter some feedback before submitting.</div>`;
  }

  content.innerHTML = `
    <div class="class-hero">
      <div class="container">
        <div class="breadcrumb" style="margin-bottom:12px;">
          <a href="index.html">Home</a><span class="sep">›</span>
          <a href="classoffice.html">Class Office</a><span class="sep">›</span>
          <span>Class of ${year}</span>
        </div>
        <div class="grade-label">${data.grade}</div>
        <h1>Class of ${year}</h1>
      </div>
    </div>

    <div class="container class-layout">

      <!-- Officers -->
      <div class="card" style="overflow:hidden;">
        <div class="officers-photo-wrap">
          <img src="https://placehold.co/900x260/1e3a8a/ffffff?text=Class+of+${year}+Officers+Photo"
               alt="Class of ${year} Officers">
        </div>
        <div class="officers-names-row">
          ${officerNamesHtml}
        </div>
      </div>

      <!-- What We've Been Doing -->
      <div class="section-card">
        <div class="section-card-title">📋 What Class Office Has Been Doing</div>
        <div class="activity-list">${activitiesHtml}</div>
      </div>

      <!-- Upcoming Fundraisers -->
      <div class="section-card">
        <div class="section-card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Upcoming Fundraisers
        </div>
        <div class="fundraiser-list">${fundraisersHtml}</div>
      </div>

      <!-- Poll -->
      <div class="section-card">
        <div class="section-card-title">🗳️ Vote on Future Fundraiser Ideas</div>
        <div id="pollSection">${buildPollSection()}</div>
      </div>

      <!-- Feedback -->
      <div class="section-card">
        <div class="section-card-title">💬 Feedback &amp; Suggestions</div>
        <div id="feedbackSection">${buildFeedbackSection()}</div>
      </div>

      <!-- Instagram -->
      <div style="text-align:center;padding:8px 0 16px;">
        <a href="${data.instagram}" target="_blank" rel="noopener" class="instagram-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          Follow Class of ${year} on Instagram
        </a>
      </div>

    </div>`;

  // Wire up poll (only if not already voted)
  if (!savedVote) {
    const selected = new Set();

    document.querySelectorAll(".poll-option").forEach(opt => {
      opt.addEventListener("click", () => {
        opt.classList.toggle("selected");
        const val = opt.dataset.value;
        if (opt.classList.contains("selected")) {
          selected.add(val);
        } else {
          selected.delete(val);
        }
        const otherWrap = document.getElementById("otherInputWrap");
        if (otherWrap) {
          otherWrap.style.display = selected.has("__other__") ? "block" : "none";
        }
      });
    });

    document.getElementById("submitVoteBtn").addEventListener("click", () => {
      const errEl = document.getElementById("voteError");
      if (selected.size === 0) { errEl.style.display = "block"; return; }
      errEl.style.display = "none";

      const options = [...selected]
        .filter(v => v !== "__other__")
        .map(v => v);
      const otherTextEl = document.getElementById("otherText");
      const other = (selected.has("__other__") && otherTextEl) ? otherTextEl.value.trim() : "";

      const voteData = { options, other };
      localStorage.setItem(VOTE_KEY, JSON.stringify(voteData));

      const tags = options.map(o => `<span class="poll-result-tag">${o}</span>`).join("");
      const otherTag = other ? `<span class="poll-result-tag">Other: ${other}</span>` : "";
      document.getElementById("pollSection").innerHTML = `
        <div class="poll-result">
          <div class="poll-result-title">Your vote has been recorded — thanks!</div>
          ${tags}${otherTag}
        </div>`;
    });
  }

  // Wire up feedback (only if not already submitted)
  if (!savedFeedback) {
    document.getElementById("submitFeedbackBtn").addEventListener("click", () => {
      const errEl  = document.getElementById("feedbackError");
      const textEl = document.getElementById("feedbackText");
      const text   = textEl.value.trim();
      if (!text) { errEl.style.display = "block"; return; }
      errEl.style.display = "none";
      localStorage.setItem(FEEDBACK_KEY, text);
      document.getElementById("feedbackSection").innerHTML =
        `<div class="feedback-result">Thanks — we've received your feedback!</div>`;
    });
  }
}

document.getElementById("navSearch").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const q = e.target.value.trim();
    if (q) location.href = `clubs.html?q=${encodeURIComponent(q)}`;
  }
});
</script>
</body>
</html>

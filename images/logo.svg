<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Blue circle background -->
  <circle cx="100" cy="100" r="100" fill="#3BAACC"/>

  <!-- Outer head silhouette (dark navy) -->
  <path d="
    M 100 22
    C 108 22 116 24 122 28
    L 138 32
    C 152 38 162 52 163 68
    L 164 86
    C 164 102 158 118 149 129
    L 145 134
    C 138 141 128 145 118 146
    L 100 147
    L 82 146
    C 72 145 62 141 55 134
    L 51 129
    C 42 118 36 102 36 86
    L 37 68
    C 38 52 48 38 62 32
    L 78 28
    C 84 24 92 22 100 22 Z
  " fill="#162840"/>

  <!-- Left ear flap -->
  <path d="
    M 46 80
    C 36 76 28 86 27 99
    C 26 113 34 124 47 128
    C 50 120 50 108 50 97
    Z
  " fill="#162840"/>


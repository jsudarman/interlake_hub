  <path d="
    M 154 80
    C 164 76 172 86 173 99
    C 174 113 166 124 153 128
    C 150 120 150 108 150 97
    Z
  " fill="#162840"/>

  <!-- Angular element lower-right (athletic chevron) -->
  <path d="
    M 138 138
    L 155 120
    L 162 128
    L 148 148
    Z
  " fill="#162840"/>

  <!-- White face / muzzle area -->
  <path d="
    M 68 74
    C 64 84 63 97 67 110
    C 71 121 84 130 100 130
    C 116 130 129 121 133 110
    C 137 97 136 84 132 74
    C 125 64 114 59 100 59
    C 86 59 75 64 68 74 Z
  " fill="#FFFFFF"/>

  <!-- Nose -->
  <ellipse cx="100" cy="76" rx="15" ry="11" fill="#162840"/>
  <!-- Nose highlight -->
  <ellipse cx="95" cy="72" rx="4.5" ry="3" fill="white" opacity="0.4"/>

  <!-- Heavy brow left -->
  <path d="M 68 58 C 76 50 88 52 90 60" stroke="#162840" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Heavy brow right -->
  <path d="M 110 60 C 112 52 124 50 132 58" stroke="#162840" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="82" cy="65" rx="7" ry="6" fill="#162840"/>
  <!-- Right eye -->
  <ellipse cx="118" cy="65" rx="7" ry="6" fill="#162840"/>

  <!-- Whisker dots - left (3 dots) -->
  <circle cx="76" cy="97"  r="3.2" fill="#162840"/>
  <circle cx="74" cy="106" r="3.2" fill="#162840"/>
  <circle cx="76" cy="115" r="3.2" fill="#162840"/>

  <!-- Whisker dots - right (3 dots) -->
  <circle cx="124" cy="97"  r="3.2" fill="#162840"/>
  <circle cx="126" cy="106" r="3.2" fill="#162840"/>
  <circle cx="124" cy="115" r="3.2" fill="#162840"/>

  <!-- Mouth -->
  <path d="M 84 121 Q 100 132 116 121" stroke="#162840" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Top tuft -->
  <path d="M 93 28 L 100 16 L 107 28 Z" fill="#162840"/>

  <!-- Forehead center stripe (white accent) -->
